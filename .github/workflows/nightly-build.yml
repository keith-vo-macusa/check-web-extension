name: Nightly Build

on:
    schedule:
        - cron: '0 1 * * *'
    workflow_dispatch:

jobs:
    nightly-build:
        name: Build Nightly Artifact
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build extension
              run: npm run build

            - name: Pack nightly zip
              shell: bash
              run: |
                  VERSION="$(node -p "require('./manifest.json').version")"
                  SHORT_SHA="${GITHUB_SHA::7}"
                  ZIP_NAME="check-web-extension-nightly-${VERSION}-${SHORT_SHA}.zip"
                  cd dist
                  zip -r "../$ZIP_NAME" .
                  cd ..
                  echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

            - name: Upload nightly artifact
              uses: actions/upload-artifact@v4
              with:
                  name: nightly-dist-${{ github.run_number }}
                  path: |
                      dist
                      ${{ env.ZIP_NAME }}
                  retention-days: 14
