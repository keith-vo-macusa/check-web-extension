name: Build And Release Extension

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build-and-release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build extension
              run: npm run build

            - name: Read extension version from manifest
              id: version
              shell: bash
              run: |
                  VERSION="$(node -p "require('./manifest.json').version")"
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"

            - name: Validate tag matches manifest version
              shell: bash
              run: |
                  TAG_VERSION="${GITHUB_REF_NAME#v}"
                  MANIFEST_VERSION="${{ steps.version.outputs.version }}"
                  if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
                    echo "Tag version ($TAG_VERSION) does not match manifest version ($MANIFEST_VERSION)"
                    exit 1
                  fi

            - name: Create release zip
              shell: bash
              run: |
                  cd dist
                  zip -r "../check-web-extension-${{ steps.version.outputs.version }}.zip" .

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: check-web-extension-dist
                  path: |
                      dist
                      check-web-extension-${{ steps.version.outputs.version }}.zip

            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: Check Web Extension v${{ steps.version.outputs.version }}
                  generate_release_notes: true
                  files: check-web-extension-${{ steps.version.outputs.version }}.zip
