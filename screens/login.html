<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="../css/login.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        />
    </head>

    <body>
        <div class="login-container">
            <div class="header">
                <div class="logo-wrapper">
                    <i class="fa-solid fa-bug-slash"></i>
                </div>
                <h1>Testing Assistant</h1>
                <p class="subtitle">Đăng nhập tài khoản Checkwise</p>
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="text"
                        id="email"
                        name="email"
                        placeholder="Enter your email"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input-container" style="position: relative">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Enter your password"
                            required
                        />
                        <button
                            type="button"
                            id="togglePassword"
                            class="password-toggle"
                            style="
                                position: absolute;
                                right: 10px;
                                top: 50%;
                                transform: translateY(-50%);
                            "
                        >
                            <span class="eye-icon"><i class="fa-solid fa-eye-slash"></i></span>
                        </button>
                    </div>
                </div>

                <div class="loading" id="loading">Authenticating...</div>

                <button type="submit" id="loginBtn" class="login-btn">Sign In</button>
            </form>
        </div>

        <script type="module" src="../js/login.js"></script>
    </body>
</html>
