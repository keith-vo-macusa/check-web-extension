<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Website Testing Assistant</title>
        <link rel="stylesheet" href="../css/popup.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        />
        <link rel="stylesheet" href="../lib/sweet-alert/sweetalert2.min.css" />
    </head>

    <body>
        <div class="popup-shell">
            <div class="header">
                <div class="header-title">
                    <div class="header-icon">
                        <i class="fas fa-bug"></i>
                    </div>
                    <div>
                        <h1>Website Testing Assistant</h1>
                        <p>Quản lý lỗi kiểm thử ngay trên trang</p>
                    </div>
                </div>
            </div>

            <div class="popup-main">
                <div id="controls" class="controls card">
                    <div class="card-section" id="toggleModeSection">
                        <div class="card-section-header">
                            <span class="card-title">Chế độ chọn lỗi</span>
                            <span class="card-subtitle">
                                Click vào trang để đánh dấu lỗi cần sửa
                            </span>
                        </div>
                        <button id="toggleMode" class="btn btn-primary">
                            <i class="fas fa-crosshairs"></i>
                            <span>Bắt đầu chọn lỗi</span>
                        </button>
                    </div>

                    <div class="card-section">
                        <div class="toggle-row">
                            <div>
                                <div class="toggle-label">Hiển thị lỗi trên trang</div>
                                <div class="toggle-description">Bật/tắt toàn bộ highlight lỗi</div>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="toggleErrors" />
                                <span class="toggle-slider"></span>
                            </label>
                        </div>

                        <div class="filters-container">
                            <div class="form-group">
                                <input
                                    type="checkbox"
                                    name="show-open-errors"
                                    id="drawOpenErrors"
                                />
                                <label for="drawOpenErrors">Lỗi đang mở</label>
                            </div>
                            <div class="form-group">
                                <input
                                    type="checkbox"
                                    name="show-resolved-errors"
                                    id="drawResolvedErrors"
                                />
                                <label for="drawResolvedErrors">Lỗi đã giải quyết</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="errors-section card">
                    <div class="errors-header">
                        <div>
                            <h3>Danh sách lỗi</h3>
                            <p class="errors-subtitle">
                                Xem nhanh lỗi đã đánh dấu và gửi thông báo
                            </p>
                        </div>
                        <div class="errors-actions">
                            <button
                                id="sendNotification"
                                class="notification-btn"
                                aria-label="Gửi thông báo lỗi"
                                title="Gửi thông báo lỗi"
                            >
                                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                    <path
                                        d="M21.8 4.1 3.1 11.6c-1.2.5-1.2 2.2 0 2.7l4.7 2 2 4.7c.5 1.2 2.2 1.2 2.7 0l7.5-18.7c.4-1-.2-2-1.2-1.6zM10.8 20.1l-1.3-3.1 6.9-6.9-8.7 6.3-3.1-1.3L20 5.8 10.8 20.1z"
                                    ></path>
                                </svg>
                                <span class="visually-hidden" id="sendNotificationLabel">
                                    Gửi thông báo lỗi
                                </span>
                            </button>
                            <button
                                id="clearAll"
                                class="clear-btn"
                                aria-label="Xóa tất cả lỗi"
                                title="Xóa tất cả lỗi"
                            >
                                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                    <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12z"></path>
                                    <path d="M19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="toggle-container toggle-resolved-row">
                        <div>
                            <span class="toggle-label">Hiển thị lỗi đã giải quyết</span>
                            <div class="toggle-description">
                                Ẩn bớt để tập trung vào lỗi đang mở
                            </div>
                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" id="toggleResolvedErrors" />
                            <span class="toggle-slider"></span>
                        </label>
                    </div>

                    <div id="errorsList" class="errors-list"></div>
                </div>
            </div>
        </div>

        <script src="../lib/jquery.min.js"></script>
        <script src="../lib/sweet-alert/sweetalert2.all.min.js"></script>
        <script type="module" src="../js/popup.js"></script>
    </body>
</html>
